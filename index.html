<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="theme-color" content="#1a73e8">
<link rel="manifest" href="manifest.json">
<title>Sales Report</title>
<style>
  /* ── Reset ── */
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', Arial, sans-serif; background: #e8eaed; color: #333; }

  /* ── מסך כניסה ── */
  #login-screen {
    position: fixed; inset: 0; background: #e8eaed;
    display: flex; align-items: center; justify-content: center; z-index: 999;
  }
  .login-box {
    background: white; border-radius: 20px; padding: 36px 28px;
    width: 90%; max-width: 340px; text-align: center;
    box-shadow: 0 4px 24px rgba(0,0,0,0.1);
  }
  .login-box h2 { font-size: 22px; margin-bottom: 6px; }
  .login-box p { font-size: 14px; color: #888; margin-bottom: 24px; }
  .login-box input {
    width: 100%; padding: 12px 16px; border: 1px solid #ddd;
    border-radius: 10px; font-size: 16px; margin-bottom: 8px;
    text-align: right; direction: rtl; text-align: right;
  }
 .login-box input[type=password] {
    letter-spacing: normal; direction: rtl; text-align: right; unicode-bidi: plaintext;
  }
  .login-box input::placeholder { text-align: right; direction: rtl; }
  .login-box button {
    width: 100%; padding: 13px; border: none; border-radius: 10px;
    background: #1a73e8; color: white; font-size: 16px;
    font-weight: bold; cursor: pointer; margin-top: 4px;
  }
  .login-error { color: #e53935; font-size: 13px; margin-top: 10px; display: none; }

  /* ── Header ── */
  header { background: #e8eaed; }
  .header-inner {
    max-width: 960px; margin: 0 auto; padding: 14px 20px;
    display: flex; align-items: center; justify-content: center; gap: 12px;
    border-radius: 0 0 12px 12px;
  }
  .header-logo { height: 36px; width: 36px; border-radius: 6px; object-fit: cover; }
  .header-title { font-size: 18px; font-weight: bold; color: white; text-align: center; }

  /* ── Toolbar (חיפוש + פילטר + עגלה) ── */
  .toolbar { background: #e8eaed; padding: 10px 0 6px; }
  .toolbar-inner {
    max-width: 960px; margin: 0 auto; padding: 0 16px;
    display: flex; gap: 10px; align-items: center; flex-wrap: wrap;
  }
  .search-wrap { flex: 1; position: relative; min-width: 0; order: 1; }
  .search-icon { position: absolute; right: 12px; top: 50%; transform: translateY(-50%); color: #aaa; font-size: 15px; pointer-events: none; }
  .toolbar-inner input {
    width: 100%; padding: 10px 36px 10px 14px; border: 1px solid #ddd;
    border-radius: 8px; font-size: 15px; direction: rtl; background: white;
  }

  /* ── כפתור פילטר ── */
  .filter-btn {
    padding: 10px 12px; border: 1px solid #ddd; border-radius: 8px;
    background: white; cursor: pointer; display: flex; align-items: center;
    justify-content: center; min-width: 42px; flex-shrink: 0; order: 2;
  }
  .filter-btn.active { background: #eef3fd; border-color: #1a73e8; }
  .filter-icon { display: flex; flex-direction: column; gap: 3px; align-items: center; }
  .filter-icon span { display: block; height: 2px; background: #555; border-radius: 2px; }
  .filter-icon span:nth-child(1) { width: 18px; }
  .filter-icon span:nth-child(2) { width: 13px; }
  .filter-icon span:nth-child(3) { width: 8px; }
  .filter-btn.active .filter-icon span { background: #1a73e8; }

  /* ── כפתור דווח מכירה בטולבר ── */
  .cart-btn {
    padding: 10px 14px; border: 1px solid #ddd; border-radius: 8px;
    background: white; cursor: pointer; display: flex; align-items: center;
    justify-content: center; gap: 6px; font-size: 14px; font-weight: bold;
    color: #555; white-space: nowrap; flex-shrink: 0; position: relative; order: 3;
  }
  .cart-btn.has-items { background: #eef3fd; border-color: #1a73e8; color: #1a73e8; }
  @media (max-width: 599px) {
    .cart-btn { width: 100%; justify-content: center; padding: 12px; margin-top: 2px; }
  }
  .cart-badge {
    background: #e53935; color: white; border-radius: 10px;
    font-size: 11px; font-weight: bold; padding: 1px 5px; min-width: 18px;
    text-align: center; display: none; margin-right: 4px;
  }
  .cart-badge.show { display: inline-block; }

  /* ── תפריט פילטר קטגוריות ── */
  .filter-dropdown {
    display: none; position: absolute; background: white;
    border: 1px solid #ddd; border-radius: 12px;
    box-shadow: 0 4px 16px rgba(0,0,0,0.12);
    padding: 12px; z-index: 50; min-width: 200px; direction: rtl;
  }
  .filter-dropdown.open { display: block; }
  .filter-dropdown h4 { font-size: 13px; color: #888; margin-bottom: 10px; }
  .filter-item { display: flex; align-items: center; gap: 8px; padding: 6px 0; font-size: 15px; }
  .filter-item input[type=checkbox] { width: 18px; height: 18px; cursor: pointer; accent-color: #1a73e8; }
  .filter-clear { margin-top: 10px; width: 100%; padding: 8px; background: #f0f2f5; border: none; border-radius: 8px; font-size: 13px; cursor: pointer; color: #555; }

  /* ── גריד מוצרים ── */
  #grid {
    display: grid; grid-template-columns: 1fr;
    gap: 12px; padding: 8px 16px 100px;
    max-width: 960px; margin: 0 auto;
  }
  @media (min-width: 600px) { #grid { grid-template-columns: repeat(2, 1fr); } }
  @media (min-width: 900px) { #grid { grid-template-columns: repeat(3, 1fr); } }

  /* ── כרטיס מוצר ── */
  .card {
    background: white; border-radius: 14px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.07);
    display: flex; flex-direction: column; overflow: hidden;
    direction: ltr; transition: box-shadow 0.2s, opacity 0.2s;
    border: 2px solid transparent; cursor: pointer;
  }
  .card.selected { box-shadow: 0 4px 16px rgba(26,115,232,0.25); }
  .card.out-of-stock { opacity: 0.45; pointer-events: none; }
  .card-body { display: flex; flex-direction: row; padding: 14px; gap: 12px; flex: 1; align-items: center; }
  .card-img { width: 90px; min-width: 90px; height: 90px; border-radius: 10px; background: #f5f5f5; object-fit: cover; object-position: center; flex-shrink: 0; }
  .card-img-placeholder { width: 90px; min-width: 90px; height: 90px; border-radius: 10px; background: #f0f2f5; display: flex; align-items: center; justify-content: center; color: #bbb; font-size: 12px; flex-shrink: 0; }
  .card-info { flex: 1; display: flex; flex-direction: column; gap: 3px; text-align: left; }
  .card-price { font-size: 13px; font-weight: bold; }
  .card-name { font-size: 15px; font-weight: bold; line-height: 1.3; }
  .card-sku { font-size: 12px; color: #888; }
  .card-stock { font-size: 12px; color: #555; margin-top: 2px; }
  .card-stock span { font-weight: bold; color: #333; }
  .card-footer { padding: 0 14px 14px; }

  /* ── כפתור הוסף לעגלה ── */
  .btn-add {
    width: 100%; padding: 10px; border: none; border-radius: 10px;
    font-size: 14px; font-weight: bold; cursor: pointer;
    display: flex; align-items: center; justify-content: center; gap: 6px;
    transition: background 0.15s;
  }

  /* ── Overlay (רקע כהה) ── */
  .overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 100; align-items: flex-end; justify-content: center; }
  .overlay.open { display: flex; }

  /* ── Sheet (פאנל תחתון) ── */
  .sheet {
    background: white; border-radius: 20px 20px 0 0;
    width: 100%; max-width: 960px; max-height: 92vh;
    display: flex; flex-direction: column; direction: rtl;
    padding-bottom: env(safe-area-inset-bottom);
    margin-top: env(safe-area-inset-top);
  }
  }
  .sheet-header { padding: 20px 20px 12px; border-bottom: 1px solid #eee; }
  .sheet-header h3 { font-size: 18px; }
  .sheet-header p { font-size: 13px; color: #888; margin-top: 4px; }
  .sheet-body { flex: 1; overflow-y: auto; padding: 12px 20px; -webkit-overflow-scrolling: touch; }

  /* ── פריט בעגלה ── */
  .cart-item { display: flex; gap: 12px; align-items: center; padding: 12px 0; border-bottom: 1px solid #f0f0f0; }
  .cart-item:last-child { border-bottom: none; }
  .cart-item-img { width: 56px; height: 56px; border-radius: 8px; object-fit: cover; background: #f5f5f5; flex-shrink: 0; }
  .cart-item-img-placeholder { width: 56px; height: 56px; border-radius: 8px; background: #f0f2f5; display: flex; align-items: center; justify-content: center; color: #ccc; font-size: 11px; flex-shrink: 0; }
  .cart-item-info { flex: 1; }
  .cart-item-name { font-size: 14px; font-weight: bold; line-height: 1.3; }
  .cart-item-sku { font-size: 11px; color: #888; margin-top: 2px; }
  .cart-item-price { font-size: 12px; margin-top: 2px; }
  .cart-qty-control { display: flex; align-items: center; gap: 8px; margin-top: 6px; }
  .qty-btn { width: 28px; height: 28px; border: 1px solid #ddd; border-radius: 6px; background: white; font-size: 16px; cursor: pointer; display: flex; align-items: center; justify-content: center; color: #555; }
  .qty-val { font-size: 15px; font-weight: bold; min-width: 20px; text-align: center; }
  .cart-item-remove { padding: 6px; color: #ccc; cursor: pointer; font-size: 18px; }
  .cart-note { margin-top: 8px; }
  .cart-note textarea { width: 100%; padding: 8px 10px; border: 1px solid #eee; border-radius: 8px; font-size: 13px; resize: none; height: 52px; direction: rtl; color: #555; }

  /* ── footer של sheet (סה"כ + כפתורים) ── */
  .sheet-footer { padding: 16px 20px; border-top: 1px solid #eee; }
  .sheet-total { display: flex; justify-content: space-between; margin-bottom: 14px; font-size: 15px; }
  .sheet-total span:last-child { font-weight: bold; font-size: 17px; }
  .sheet-btns { display: flex; gap: 10px; }
  .sheet-btns button { flex: 1; padding: 13px; border: none; border-radius: 12px; font-size: 15px; cursor: pointer; font-weight: bold; }
  .btn-back { background: #f0f2f5; color: #555; }
  .btn-send { background: #1a73e8; color: white; }
  .btn-send:disabled { background: #90b8f0; }
  .empty-cart { text-align: center; padding: 32px; color: #aaa; font-size: 15px; }

  /* ── Footer דף ── */
  footer { text-align: center; padding: 20px; color: #aaa; font-size: 12px; max-width: 960px; margin: 0 auto; }

  /* ── כפתור צף (FAB) ── */
  .fab {
    position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
    color: white; border: none; border-radius: 24px;
    padding: 14px 28px; font-size: 15px; font-weight: bold;
    cursor: pointer; box-shadow: 0 4px 16px rgba(0,0,0,0.2);
    display: flex; align-items: center; gap: 8px;
    z-index: 80; opacity: 0; pointer-events: none;
    transition: opacity 0.25s; white-space: nowrap; background: #1a73e8;
  }
  .fab.visible { opacity: 1; pointer-events: auto; }
  .fab-badge { background: #e53935; color: white; border-radius: 10px; font-size: 12px; font-weight: bold; padding: 1px 7px; min-width: 20px; text-align: center; }

  /* ── Toast הודעה ── */
  #toast { position: fixed; bottom: 90px; left: 50%; transform: translateX(-50%); background: #323232; color: white; padding: 12px 24px; border-radius: 24px; font-size: 14px; opacity: 0; transition: opacity 0.3s; pointer-events: none; z-index: 200; white-space: nowrap; }
  #toast.show { opacity: 1; }
  #loading { text-align: center; padding: 40px; color: #888; font-size: 15px; grid-column: 1/-1; }

  /* ── תפריט פרטי מוצר ── */
  .product-sheet { direction: rtl; }
  .product-sheet-img { width: 100%; height: 220px; object-fit: contain; background: #f8f9fa; }
  .product-sheet-img-placeholder { width: 100%; height: 220px; background: #f0f2f5; display: flex; align-items: center; justify-content: center; color: #bbb; font-size: 14px; }
  .product-sheet-body { padding: 20px; }
  .product-sheet-title { font-size: 22px; font-weight: bold; margin-bottom: 4px; }
  .product-sheet-sku { font-size: 13px; color: #888; margin-bottom: 20px; }
  .product-sheet-row { display: flex; justify-content: space-between; align-items: flex-start; padding: 13px 0; border-bottom: 1px solid #f0f0f0; font-size: 15px; }
  .product-sheet-row:last-of-type { border-bottom: none; }
  .product-sheet-label { color: #888; font-size: 14px; flex-shrink: 0; margin-left: 12px; }
  .product-sheet-value { font-weight: 500; text-align: left; word-break: break-word; max-width: 60%; }
  .product-sheet-link { color: #1a73e8; text-decoration: none; font-size: 14px; word-break: break-all; text-align: left; max-width: 60%; }
  .product-sheet-footer { padding: 16px 20px; border-top: 1px solid #eee; }
  .product-sheet-footer button { width: 100%; padding: 14px; border: none; border-radius: 12px; font-size: 16px; font-weight: bold; cursor: pointer; color: white; }

  /* ── כפתור חזור ── */
  .sheet-back-btn {
    display: flex; align-items: center; gap: 8px;
    padding: 14px 20px; border-bottom: 1px solid #f0f0f0;
    cursor: pointer; color: #1a73e8; font-size: 15px;
    background: none; border-top: none; border-right: none; border-left: none;
    width: 100%; text-align: right; direction: rtl;
  }
</style>
</head>
<body>

<!-- ═══════════════════════════════════════
     מסך כניסה
════════════════════════════════════════ -->
<div id="login-screen">
  <div class="login-box">
    <div style="font-size:36px;margin-bottom:12px">🔐</div>
    <h2 id="login-title">Player 1</h2>
    <p>הכנס פרטי כניסה</p>
    <!-- שדה שם משתמש -->
    <input type="text" id="username-input" placeholder="שם משתמש" autocomplete="username" dir="rtl">
    <!-- שדה סיסמה -->
        <input type="password" id="pin-input" placeholder="סיסמה" autocomplete="current-password" dir="rtl"
           onkeydown="if(event.key==='Enter')doLogin()">
    <button id="login-btn" onclick="doLogin()">כניסה</button>
    <div class="login-error" id="login-error">שם משתמש או סיסמה שגויים</div>
  </div>
</div>

<!-- ═══════════════════════════════════════
     האפליקציה הראשית (מוסתרת עד לאחר login)
════════════════════════════════════════ -->
<div id="app" style="display:none">

  <!-- Header עם לוגו וכותרת -->
  <header id="site-header">
    <div class="header-inner" id="header-inner">
      <img id="header-logo" class="header-logo" src="" style="display:none" onerror="this.style.display='none'">
      <div class="header-title" id="header-title">📦 Sales Report</div>
    </div>
  </header>

  <!-- Toolbar – חיפוש, פילטר, כפתור דיווח -->
  <div class="toolbar" id="toolbar-sentinel">
    <div class="toolbar-inner">
      <!-- שדה חיפוש -->
      <div class="search-wrap">
        <span class="search-icon">🔍</span>
        <input type="text" id="searchInput" placeholder="...חיפוש לפי שם או מק״ט" oninput="filterProducts()">
      </div>
      <!-- כפתור פילטר קטגוריות -->
      <button class="filter-btn" id="filterBtn" onclick="toggleFilter()">
        <div class="filter-icon"><span></span><span></span><span></span></div>
      </button>
      <!-- כפתור דווח מכירה -->
      <button class="cart-btn" id="cartBtn" onclick="openCart()">
        🛒 דווח מכירה
        <span class="cart-badge" id="cartBadge"></span>
      </button>
    </div>
  </div>

  <!-- תפריט פילטר קטגוריות (נפתח בלחיצה) -->
  <div class="filter-dropdown" id="filterDropdown">
    <h4>סינון לפי קטגוריה</h4>
    <div id="filterList"></div>
    <button class="filter-clear" onclick="clearFilters()">נקה סינון</button>
  </div>

  <!-- גריד המוצרים -->
  <div id="grid"><div id="loading">טוען מוצרים...</div></div>

  <!-- Footer עם לינק לאתר -->
  <footer id="footer" style="display:none">
    <a id="footer-link" href="#" target="_blank" style="color:#aaa"></a>
  </footer>

  <!-- ── עגלת מכירה ── -->
  <div class="overlay" id="cart-overlay">
    <div class="sheet">
      <div class="sheet-header">
        <h3>🧾 סיכום מכירה</h3>
        <p id="cart-subtitle">0 פריטים</p>
      </div>
      <div class="sheet-body" id="cart-body"></div>
      <div class="sheet-footer">
        <div class="sheet-total">
          <span>סה"כ</span>
          <span id="cart-total">₪0</span>
        </div>
        <div class="sheet-btns">
          <button class="btn-back" onclick="closeCart()">חזור→</button>
          <button class="btn-send" id="send-btn" onclick="sendAll()">✓ שלח דיווח</button>
        </div>
      </div>
    </div>
  </div>

  <!-- ── כפתור צף ── -->
  <button class="fab" id="fab" onclick="openCart()">
    🛒 דווח מכירה
    <span class="fab-badge" id="fabBadge">0</span>
  </button>

</div><!-- סוף #app -->

<!-- ── תפריט פרטי מוצר ── -->
<div class="overlay" id="product-overlay">
  <div class="sheet product-sheet">
    <!-- כפתור חזור -->
    <button class="sheet-back-btn" onclick="closeProduct()">חזור→</button>
    <div class="sheet-body" style="overflow-y:auto;-webkit-overflow-scrolling:touch;">
      <!-- תמונת מוצר -->
      <div id="product-img-wrap"></div>
      <div class="product-sheet-body">
        <!-- שם ומק"ט -->
        <div class="product-sheet-title" id="pd-name"></div>
        <div class="product-sheet-sku" id="pd-sku"></div>
        <!-- שורות פרטים -->
        <div class="product-sheet-row">
          <span class="product-sheet-label">מותג</span>
          <span class="product-sheet-value" id="pd-brand"></span>
        </div>
        <div class="product-sheet-row">
          <span class="product-sheet-label">מחיר משווק <small style="color:#aaa;font-weight:normal">ללא מע"מ</small></span>
          <span class="product-sheet-value" id="pd-price-retail"></span>
        </div>
        <div class="product-sheet-row">
          <span class="product-sheet-label">מחיר לצרכן <small style="color:#aaa;font-weight:normal">כולל מע"מ</small></span>
          <span class="product-sheet-value" id="pd-price-consumer"></span>
        </div>
        <div class="product-sheet-row">
          <span class="product-sheet-label">מלאי</span>
          <span class="product-sheet-value" id="pd-stock"></span>
        </div>
        <!-- תיאור מוצר (מוסתר אם ריק) -->
        <div class="product-sheet-row" id="pd-desc-row">
          <span class="product-sheet-label">תיאור מוצר</span>
          <span class="product-sheet-value" id="pd-desc"></span>
        </div>
        <!-- לינק לאתר יצרן (מוסתר אם ריק) -->
        <div class="product-sheet-row" id="pd-link-row">
          <span class="product-sheet-label">לינק לאתר היצרן</span>
          <a class="product-sheet-link" id="pd-link" href="#" target="_blank"></a>
        </div>
      </div>
    </div>
    <!-- כפתור הוסף לעגלה -->
    <div class="product-sheet-footer">
      <button id="pd-add-btn" onclick="addFromDetail()"></button>
    </div>
  </div>
</div>

<!-- Toast הודעות -->
<div id="toast"></div>

<script>
  // ═══════════════════════════════════════
  // הגדרות בסיסיות
  // ═══════════════════════════════════════
  var API_URL = 'https://script.google.com/macros/s/AKfycbyW-ntOxu3l16w24ExrDQZ8jKkp1YxZaCA2DkcdIy6Ha_QJpPTfPtJooUXFNsACGvRR/exec';
  var SECRET_TOKEN = 'tenam@player1-xyz-2025-abc';

  var products         = [];
  var cart             = {};
  var headerColor      = '#1a73e8';
  var activeCategories = [];
  var userRole         = null;
  var selectedProduct  = null;

  // ═══════════════════════════════════════
  // XSS Protection – escape כל נתון לפני HTML
  // ═══════════════════════════════════════
  function esc(str) {
    return String(str || '')
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;')
      .replace(/'/g, '&#39;');
  }

  // ═══════════════════════════════════════
  // תיקון bfcache – רענון בחזרה מהיסטוריה
  // ═══════════════════════════════════════
  window.addEventListener('pageshow', function(e) {
    if (e.persisted) location.reload();
  });

  // ═══════════════════════════════════════
  // בדיקת session קיים בטעינה
  // ═══════════════════════════════════════
  (function checkSession() {
    var savedRole  = sessionStorage.getItem('role');
    var savedToken = sessionStorage.getItem('token');
    if (savedRole && savedToken) {
      userRole     = savedRole;
      SECRET_TOKEN = savedToken;
      startApp();
    }
  })();

  // ═══════════════════════════════════════
  // התחברות
  // ═══════════════════════════════════════
  function doLogin() {
    var username = document.getElementById('username-input').value.trim();
    var password = document.getElementById('pin-input').value.trim();
    if (!username || !password) return;

    var btn = document.getElementById('login-btn');
    btn.textContent = 'מתחבר...';
    btn.disabled    = true;

    fetch(API_URL + '?action=login&username=' + encodeURIComponent(username) + '&password=' + encodeURIComponent(password))
      .then(function(r) { return r.json(); })
      .then(function(data) {
        if (data.success) {
          userRole = data.role;
          sessionStorage.setItem('role',     data.role);
          sessionStorage.setItem('token',    data.token);
          sessionStorage.setItem('username', data.username || '');
          startApp();
        } else {
          var errEl = document.getElementById('login-error');
          errEl.textContent = data.message || 'שם משתמש או סיסמה שגויים';
          errEl.style.display = 'block';
          btn.textContent = 'כניסה';
          btn.disabled    = false;
        }
      })
      .catch(function() {
        document.getElementById('login-error').textContent = 'שגיאת תקשורת, נסה שוב';
        document.getElementById('login-error').style.display = 'block';
        btn.textContent = 'כניסה';
        btn.disabled    = false;
      });
  }

  // ═══════════════════════════════════════
  // הפעלת האפליקציה
  // ═══════════════════════════════════════
  function startApp() {
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('app').style.display          = 'block';
    loadProducts();
  }

  // ═══════════════════════════════════════
  // טעינת מוצרים
  // ═══════════════════════════════════════
  function loadProducts() {
    fetch(API_URL + '?action=getProducts&token=' + encodeURIComponent(SECRET_TOKEN))
      .then(function(r) { return r.json(); })
      .then(function(data) {
        if (data.error === 'unauthorized') { sessionStorage.clear(); location.reload(); return; }
        products = data.products || [];
        applyHeader(data.header);
        buildCategoryFilter();
        renderProducts(products);
      })
      .catch(function() {
        document.getElementById('grid').innerHTML = '<div id="loading">שגיאה בטעינה, נסה לרענן</div>';
      });
  }

  // ═══════════════════════════════════════
  // החלת Header
  // ═══════════════════════════════════════
  function applyHeader(h) {
    if (!h) return;
    if (h.title) {
      document.getElementById('header-title').textContent = h.title;
      document.getElementById('login-title').textContent  = h.title;
      document.title = h.title;
    }
    if (h.color && h.color.trim()) {
      headerColor = h.color.trim();
      document.getElementById('header-inner').style.background = headerColor;
      document.getElementById('fab').style.background           = headerColor;
      document.getElementById('send-btn').style.background      = headerColor;
    }
    if (h.logoUrl) {
      var logo = document.getElementById('header-logo');
      logo.src = h.logoUrl; logo.style.display = 'block';
    }
    if (h.siteUrl) {
      document.getElementById('footer-link').href        = h.siteUrl;
      document.getElementById('footer-link').textContent = h.siteUrl;
      document.getElementById('footer').style.display    = 'block';
    }
  }

  // ═══════════════════════════════════════
  // בניית פילטר קטגוריות
  // ═══════════════════════════════════════
  function buildCategoryFilter() {
    var cats = {};
    products.forEach(function(p) { cats[p.brand] = true; });
    var list = document.getElementById('filterList');
    list.innerHTML = '';
    activeCategories = [];
    Object.keys(cats).forEach(function(cat) {
      activeCategories.push(cat);
      var label = document.createElement('label');
      label.className = 'filter-item';
      var cb = document.createElement('input');
      cb.type = 'checkbox'; cb.checked = true; cb.value = cat;
      cb.addEventListener('change', onFilterChange);
      label.appendChild(cb);
      label.appendChild(document.createTextNode(' ' + cat));
      list.appendChild(label);
    });
  }

  // ═══════════════════════════════════════
  // רינדור כרטיסי מוצרים (עם XSS protection)
  // ═══════════════════════════════════════
  function renderProducts(list) {
    var grid = document.getElementById('grid');
    if (list.length === 0) { grid.innerHTML = '<div id="loading">לא נמצאו מוצרים</div>'; return; }
    grid.innerHTML = '';

    list.forEach(function(p) {
      var outOfStock = p.stock <= 0;
      var inCart     = cart[p.sku] && cart[p.sku].qty > 0;
      var qty        = inCart ? cart[p.sku].qty : 0;

      var imgHtml = p.imageUrl
        ? '<img class="card-img" src="' + esc(p.imageUrl) + '" onerror="this.outerHTML=\'<div class=card-img-placeholder>No Image</div>\'">'
        : '<div class="card-img-placeholder">No Image</div>';

      var btnHtml = '';
      if (!outOfStock && !p.displayOnly) {
        btnHtml = inCart
          ? '<button class="btn-add" style="background:' + esc(headerColor) + ';color:white" onclick="event.stopPropagation();addToCart(\'' + esc(p.sku) + '\')">' +
            '&#10003; נוסף (' + qty + ')</button>'
          : '<button class="btn-add" style="background:#eef3fd;color:' + esc(headerColor) + '" onclick="event.stopPropagation();addToCart(\'' + esc(p.sku) + '\')">+ הוסף</button>';
      }

      var card = document.createElement('div');
      card.className   = 'card' + (outOfStock ? ' out-of-stock' : '') + (inCart ? ' selected' : '');
      card.id          = 'card-' + p.sku;
      card.style.borderColor = inCart ? headerColor : 'transparent';
      card.addEventListener('click', function() { openProduct(p.sku); });
      card.innerHTML =
        '<div class="card-body">' + imgHtml +
          '<div class="card-info">' +
            '<div class="card-price" style="color:' + esc(headerColor) + '">&#8362;' + esc(p.price) + '</div>' +
            '<div class="card-name">'  + esc(p.name)  + '</div>' +
            '<div class="card-sku">'   + esc(p.sku)   + '</div>' +
            '<div class="card-stock">מלאי: <span>' + esc(p.stock) + '</span></div>' +
          '</div>' +
        '</div>' +
        '<div class="card-footer">' + btnHtml + '</div>';
      grid.appendChild(card);
    });
  }

  // ═══════════════════════════════════════
  // עגלה
  // ═══════════════════════════════════════
  function addToCart(sku) {
    var p = products.find(function(x) { return x.sku === sku; });
    if (!p) return;
    if (!cart[sku]) cart[sku] = { qty: 0, note: '' };
    if (cart[sku].qty >= p.stock) { showToast('מלאי מקסימלי: ' + p.stock + ' יח\''); return; }
    cart[sku].qty += 1;
    updateCartBadge();
    var card = document.getElementById('card-' + sku);
    if (!card) return;
    card.classList.add('selected');
    card.style.borderColor = headerColor;
    card.querySelector('.card-footer').innerHTML =
      '<button class="btn-add" style="background:' + headerColor + ';color:white" onclick="event.stopPropagation();addToCart(\'' + esc(sku) + '\')">' +
      '&#10003; נוסף (' + cart[sku].qty + ')</button>';
  }

  function updateCartBadge() {
    var total = Object.keys(cart).reduce(function(s, k) { return s + cart[k].qty; }, 0);
    var badge = document.getElementById('cartBadge');
    var btn   = document.getElementById('cartBtn');
    var fb    = document.getElementById('fabBadge');
    badge.textContent = total > 0 ? total : '';
    badge.classList.toggle('show', total > 0);
    btn.classList.toggle('has-items', total > 0);
    if (fb) fb.textContent = total;
  }

  function openCart()  { renderCart(); document.getElementById('cart-overlay').classList.add('open'); pushHistory('cart'); }
  function closeCart() { document.getElementById('cart-overlay').classList.remove('open'); }

  function renderCart() {
    var body  = document.getElementById('cart-body');
    var items = Object.keys(cart).filter(function(s) { return cart[s].qty > 0; });
    if (items.length === 0) {
      body.innerHTML = '<div class="empty-cart">העגלה ריקה</div>';
      document.getElementById('cart-subtitle').textContent = '0 פריטים';
      document.getElementById('cart-total').textContent = '₪0';
      return;
    }
    document.getElementById('cart-subtitle').textContent = items.length + ' פריטים';
    body.innerHTML = '';
    var grandTotal = 0;
    items.forEach(function(sku) {
      var p = products.find(function(x) { return x.sku === sku; });
      if (!p) return;
      grandTotal += cart[sku].qty * p.price;
      var imgHtml = p.imageUrl
        ? '<img class="cart-item-img" src="' + esc(p.imageUrl) + '" onerror="this.outerHTML=\'<div class=cart-item-img-placeholder>&#8212;</div>\'">'
        : '<div class="cart-item-img-placeholder">&#8212;</div>';
      var row = document.createElement('div');
      row.className = 'cart-item';
      row.innerHTML = imgHtml +
        '<div class="cart-item-info">' +
          '<div class="cart-item-name">'  + esc(p.name)  + '</div>' +
          '<div class="cart-item-sku">'   + esc(p.sku)   + '</div>' +
          '<div class="cart-item-price" style="color:' + headerColor + '">&#8362;' + esc(p.price) + ' ליח\'</div>' +
          '<div class="cart-qty-control">' +
            '<button class="qty-btn" onclick="changeQty(\'' + esc(sku) + '\',-1)">&#8722;</button>' +
            '<span class="qty-val" id="qty-' + esc(sku) + '">' + cart[sku].qty + '</span>' +
            '<button class="qty-btn" onclick="changeQty(\'' + esc(sku) + '\',1)">+</button>' +
          '</div>' +
          '<div class="cart-note"><textarea placeholder="הערה (אופציונלי)..." onchange="setNote(\'' + esc(sku) + '\',this.value)">' + esc(cart[sku].note || '') + '</textarea></div>' +
        '</div>' +
        '<div class="cart-item-remove" onclick="removeFromCart(\'' + esc(sku) + '\')">&#10005;</div>';
      body.appendChild(row);
    });
    document.getElementById('cart-total').textContent = '₪' + grandTotal.toLocaleString();
  }

  function changeQty(sku, delta) {
    if (!cart[sku]) return;
    var p      = products.find(function(x) { return x.sku === sku; });
    var maxQty = p ? p.stock : 999;
    var newQty = Math.min(maxQty, Math.max(0, cart[sku].qty + delta));
    if (delta > 0 && newQty === cart[sku].qty) { showToast('מלאי מקסימלי: ' + maxQty + ' יח\''); return; }
    cart[sku].qty = newQty;
    if (cart[sku].qty === 0) { removeFromCart(sku); return; }
    document.getElementById('qty-' + sku).textContent = cart[sku].qty;
    updateTotals();
    var card = document.getElementById('card-' + sku);
    if (card) card.querySelector('.card-footer').innerHTML =
      '<button class="btn-add" style="background:' + headerColor + ';color:white" onclick="event.stopPropagation();addToCart(\'' + esc(sku) + '\')">' +
      '&#10003; נוסף (' + cart[sku].qty + ')</button>';
    updateCartBadge();
  }

  function setNote(sku, val) { if (cart[sku]) cart[sku].note = val; }

  function removeFromCart(sku) {
    delete cart[sku];
    updateCartBadge();
    var card = document.getElementById('card-' + sku);
    if (card) {
      card.classList.remove('selected');
      card.style.borderColor = 'transparent';
      card.querySelector('.card-footer').innerHTML =
        '<button class="btn-add" style="background:#eef3fd;color:' + headerColor + '" onclick="event.stopPropagation();addToCart(\'' + esc(sku) + '\')">+ הוסף</button>';
    }
    renderCart();
  }

  function updateTotals() {
    var items = Object.keys(cart).filter(function(s) { return cart[s].qty > 0; });
    var grandTotal = 0;
    items.forEach(function(sku) {
      var p = products.find(function(x) { return x.sku === sku; });
      if (p) grandTotal += cart[sku].qty * p.price;
    });
    document.getElementById('cart-total').textContent    = '₪' + grandTotal.toLocaleString();
    document.getElementById('cart-subtitle').textContent = items.length + ' פריטים';
  }

  // ═══════════════════════════════════════
  // שליחת דיווח מכירה
  // ═══════════════════════════════════════
  function sendAll() {
    var items = Object.keys(cart).filter(function(s) { return cart[s].qty > 0; });
    if (items.length === 0) return;

    // בדיקת מלאי לפני שליחה
    var overStock = [];
    items.forEach(function(sku) {
      var p = products.find(function(x) { return x.sku === sku; });
      if (p && cart[sku].qty > p.stock) {
        overStock.push(esc(p.name) + ' (מלאי: ' + p.stock + ', מבוקש: ' + cart[sku].qty + ')');
      }
    });
    if (overStock.length > 0) { showToast('חריגת מלאי: ' + overStock[0]); return; }

    var btn = document.getElementById('send-btn');
    btn.disabled = true; btn.textContent = 'שולח...';

    var calls    = items.length;
    var done     = 0;
    var cartCopy = JSON.parse(JSON.stringify(cart));

    items.forEach(function(sku) {
      var p = products.find(function(x) { return x.sku === sku; });
      fetch(API_URL, {
        method: 'POST',
        body: JSON.stringify({
          token:       SECRET_TOKEN,
          sku:         sku,
          productName: p ? p.name : sku,
          quantity:    cartCopy[sku].qty,
          note:        cartCopy[sku].note || '',
          username:    sessionStorage.getItem('username') || ''
        })
      }).then(function() {
        done++;
        if (done === calls) {
          items.forEach(function(s) {
            var prod = products.find(function(x) { return x.sku === s; });
            if (prod) prod.stock = Math.max(0, prod.stock - cartCopy[s].qty);
          });
          cart = {};
          updateCartBadge();
          closeCart();
          renderProducts(products);
          showToast('&#10003; ' + calls + ' פריטים דווחו בהצלחה');
          btn.disabled = false; btn.textContent = '&#10003; שלח דיווח';
          btn.style.background = headerColor;
          setTimeout(loadProducts, 3000);
        }
      }).catch(function() {
        done++;
        if (done === calls) {
          showToast('שגיאה בשליחה, נסה שוב');
          btn.disabled = false; btn.textContent = '&#10003; שלח דיווח';
        }
      });
    });
  }

  // ═══════════════════════════════════════
  // פילטר וחיפוש
  // ═══════════════════════════════════════
  function toggleFilter() {
    var dd  = document.getElementById('filterDropdown');
    var btn = document.getElementById('filterBtn');
    dd.classList.toggle('open');
    btn.classList.toggle('active');
    if (dd.classList.contains('open')) {
      var rect = btn.getBoundingClientRect();
      dd.style.top   = (rect.bottom + window.scrollY + 6) + 'px';
      dd.style.right = (window.innerWidth - rect.right) + 'px';
    }
  }

  function onFilterChange() {
    activeCategories = [];
    document.querySelectorAll('#filterList input:checked').forEach(function(cb) { activeCategories.push(cb.value); });
    filterProducts();
    document.getElementById('filterBtn').classList.toggle('active',
      document.querySelectorAll('#filterList input:not(:checked)').length > 0);
  }

  function clearFilters() {
    document.querySelectorAll('#filterList input').forEach(function(cb) { cb.checked = true; });
    onFilterChange();
  }

  function filterProducts() {
    var q = document.getElementById('searchInput').value.toLowerCase();
    var filtered = products.filter(function(p) {
      return (p.name.toLowerCase().includes(q) || String(p.sku).toLowerCase().includes(q))
             && activeCategories.indexOf(p.brand) !== -1;
    });
    renderProducts(filtered);
  }

  // ═══════════════════════════════════════
  // תפריט פרטי מוצר (עם XSS protection)
  // ═══════════════════════════════════════
  function openProduct(sku) {
    var p = products.find(function(x) { return x.sku === sku; });
    if (!p) return;
    selectedProduct = p;

    document.getElementById('product-img-wrap').innerHTML = p.imageUrl
      ? '<img class="product-sheet-img" src="' + esc(p.imageUrl) + '" onerror="this.outerHTML=\'<div class=product-sheet-img-placeholder>No Image</div>\'">'
      : '<div class="product-sheet-img-placeholder">No Image</div>';

    document.getElementById('pd-name').textContent           = p.name;
    document.getElementById('pd-sku').textContent            = p.sku;
    document.getElementById('pd-brand').textContent          = p.brand || '—';
    document.getElementById('pd-price-retail').textContent   = p.retailPrice ? '&#8362;' + p.retailPrice : '—';
    document.getElementById('pd-price-consumer').textContent = p.price ? '&#8362;' + p.price : '—';
    document.getElementById('pd-stock').textContent          = p.stock;

    var descRow = document.getElementById('pd-desc-row');
    descRow.style.display = p.description ? 'flex' : 'none';
    document.getElementById('pd-desc').textContent = p.description || '';

    var linkRow = document.getElementById('pd-link-row');
    linkRow.style.display = p.siteUrl ? 'flex' : 'none';
    document.getElementById('pd-link').href        = p.siteUrl || '#';
    document.getElementById('pd-link').textContent = p.siteUrl || '';

    var addBtn = document.getElementById('pd-add-btn');
    addBtn.style.background = headerColor;
    if (p.stock <= 0 || p.displayOnly) {
      addBtn.style.display = 'none';
    } else {
      addBtn.style.display = 'block';
      var inCart = cart[p.sku] && cart[p.sku].qty > 0;
      addBtn.textContent = inCart
        ? '✓ נוסף לעגלה (' + cart[p.sku].qty + ') — הוסף עוד'
        : '+ הוסף לעגלה';
    }

    var overlay = document.getElementById('product-overlay');
    overlay.classList.add('open');
    pushHistory('product');
    var body = overlay.querySelector('.sheet-body');
    if (body) body.scrollTop = 0;
  }

  function closeProduct() {
    document.getElementById('product-overlay').classList.remove('open');
    selectedProduct = null;
  }

  function addFromDetail() {
    if (!selectedProduct) return;
    var p = selectedProduct;
    if (cart[p.sku] && cart[p.sku].qty >= p.stock) { showToast('מלאי מקסימלי: ' + p.stock + ' יח\''); return; }
    addToCart(p.sku);
    var addBtn = document.getElementById('pd-add-btn');
    addBtn.textContent = '&#10003; נוסף לעגלה (' + cart[p.sku].qty + ') — הוסף עוד';
  }

  // ═══════════════════════════════════════
  // Toast הודעה
  // ═══════════════════════════════════════
  function showToast(msg) {
    var t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(function() { t.classList.remove('show'); }, 3000);
  }

  // ═══════════════════════════════════════
  // ניהול כפתור חזור של הטלפון
  // ═══════════════════════════════════════
  function pushHistory(state) {
    history.pushState({ overlay: state }, '');
  }

  window.addEventListener('popstate', function() {
    if (document.getElementById('product-overlay').classList.contains('open')) {
      closeProduct(); return;
    }
    if (document.getElementById('cart-overlay').classList.contains('open')) {
      closeCart(); return;
    }
    if (document.getElementById('filterDropdown').classList.contains('open')) {
      document.getElementById('filterDropdown').classList.remove('open');
      document.getElementById('filterBtn').classList.remove('active');
    }
  });

  // סגירת פילטר בלחיצה מחוץ
  document.addEventListener('click', function(e) {
    if (!e.target.closest('#filterDropdown') && !e.target.closest('#filterBtn')) {
      document.getElementById('filterDropdown').classList.remove('open');
      document.getElementById('filterBtn').classList.remove('active');
    }
  });

  // ═══════════════════════════════════════
  // FAB – מופיע כשהטולבר יוצא מהמסך
  // ═══════════════════════════════════════
  var fab = document.getElementById('fab');
  window.addEventListener('scroll', function() {
    var sentinel = document.getElementById('toolbar-sentinel');
    if (!sentinel) return;
    fab.classList.toggle('visible', sentinel.getBoundingClientRect().bottom < 0);
  }, { passive: true });
</script>
</body>
